[global/wm]
include-file= ~/.config/polybar/custom/defineData.ini
include-file= ~/.config/polybar/custom/modules/cpu.ini
include-file= ~/.config/polybar/custom/modules/hlwm.ini
include-file= ~/.config/polybar/custom/modules/date.ini
include-file= ~/.config/polybar/custom/modules/memory.ini
include-file= ~/.config/polybar/custom/modules/xkeyboard.ini
include-file= ~/.config/polybar/custom/modules/os.ini
include-file= ~/.config/polybar/custom/modules/demo.ini
include-file= ~/.config/polybar/custom/modules/vdeio.ini

[bar/main]
monitor = HDMI-0
monitor-strict = false
monitor-exact = false

bottom = false
fixed-center = true
width = 100%
height = 35 
;35

override-redirect = false
format-padding = 1
; offset-x = 25%
; offset-y = 10%

background = ${color.layer1}
foreground = ${color.layer4}
radius = 0.0

line-size = 2
line-color = ${color.layer2}
padding = 1
module-margin = 0

font-0 = ${font.font0}
font-1 = ${font.font1}
font-2 = ${font.font2}

modules-left = manu hlwm vdeio
modules-center = date
modules-right = cpu memory xkeyboard demo

; separator = " "
spacing = 0
dim-value = 1.0
enable-struts = true
dpi-x = 96
dpi-y = 96
enable-ipc = true

double-click-interval = 400
cursor-click = pointer
cursor-scroll = ns-resize

